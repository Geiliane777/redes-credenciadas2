<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="icon" href="img/tooth.png">

<link rel="stylesheet" href="css/admin.css">


<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</head>


<body>



<!-- ==============================
     ÁREA LOGIN
================================ -->


<div id="loginArea" class="login-container">


    <div class="login-box">


        <img src="img/tooth.png">


        <h1>
            Painel Administrativo
        </h1>


        <p>
            Redes Credenciadas
        </p>



        <input
            type="text"
            id="usuario"
            placeholder="Usuário"
        >



        <input
            type="password"
            id="senha"
            placeholder="Senha"
        >



        <button onclick="login()">

            Entrar

        </button>



        <div id="erroLogin"></div>



    </div>


</div>






<!-- ==============================
     PAINEL ADMINISTRATIVO
================================ -->


<div id="painelAdmin" style="display:none;">



<header class="admin-header">


    <div>

        <h1>
            ⚙ Painel Administrativo
        </h1>

        <p>
            Gerenciamento das redes credenciadas
        </p>

    </div>



    <button onclick="sairAdmin()">

        🚪 Sair

    </button>


</header>







<div class="admin-layout">



<!-- MENU -->

<aside class="menu-admin">


    <button onclick="abrirModulo('clinicas')">

        🏥 Clínicas

    </button>



    <button onclick="abrirModulo('especialidades')">

        🦷 Especialidades

    </button>




    <button onclick="abrirModulo('regioes')">

        🌎 Regiões

    </button>




    <button onclick="abrirModulo('estados')">

        📍 Estados

    </button>




    <button onclick="abrirModulo('cidades')">

        🏙 Cidades

    </button>




    <button onclick="abrirModulo('bairros')">

        📌 Bairros

    </button>



</aside>







<!-- ÁREA DE TRABALHO -->

<section id="areaTrabalho" class="area-trabalho">


    <h2>
        Bem-vindo ao painel
    </h2>


    <p>
        Escolha uma opção no menu.
    </p>


</section>





</div>




</div>







<!-- ==============================
     SCRIPTS
================================ -->


<script src="js/supabase.js"></script>

<script src="js/tema.js"></script>

<script src="js/admin.js?v=2"></script>



</body>

</html>
