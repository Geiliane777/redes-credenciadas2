<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Administrativo</title>

    <link rel="icon" href="img/tooth.png">

    <link rel="stylesheet" href="css/admin.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="loginContainer">

    <div class="loginCard">

        <img
            src="img/tooth.png"
            class="logo">

        <h1>

            Painel Administrativo

        </h1>

        <p>

            Redes Credenciadas

        </p>

        <input
            type="text"
            id="usuario"
            placeholder="Usuário">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button
            id="btnEntrar">

            Entrar

        </button>

        <div id="mensagem"></div>

        <hr>

        <button
            class="voltar"
            onclick="window.location.href='index.html'">

            ← Voltar para Busca

        </button>

    </div>

</div>

<script src="js/supabase.js"></script>
<script src="js/login.js"></script>

</body>

</html>
