<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="stylesheet" href="css/admin.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>


<body>


<!-- LOGIN -->

<section id="login" class="login-container">


<div class="login-box">


<h1>
⚙️ Admin
</h1>


<input 
id="usuario"
placeholder="Usuário">


<input 
id="senha"
type="password"
placeholder="Senha">


<button onclick="entrar()">
Entrar
</button>


</div>


</section>





<!-- PAINEL -->

<section id="painel" class="hidden">


<div class="header-admin">

<h1>
Painel Administrativo
</h1>

<p>
Gerenciamento Redes Especialistas
</p>

</div>



<div class="admin-container">


<div class="menu">


<button onclick="abrirModulo('localizacao')">
📍 Localização
</button>


<button onclick="abrirModulo('clinicas')">
🦷 Clínicas
</button>


<button onclick="abrirModulo('especialidades')">
📋 Especialidades
</button>


<button onclick="abrirModulo('redes')">
🌐 Redes
</button>


<button onclick="sair()">
🚪 Sair
</button>


</div>


</div>


</section>




<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>


</body>

</html>
