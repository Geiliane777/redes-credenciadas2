<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>

    <link rel="icon" href="img/tooth.png">

    <link rel="stylesheet" href="css/admin.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="header">

    <img src="img/tooth.png" class="logo">

    <h1>Painel Administrativo</h1>

    <p>
        Gerenciamento das Redes Credenciadas
    </p>

</header>

<div class="container">

    <button
        class="btnVoltar"
        onclick="location.href='index.html'">

        ← Voltar para Busca

    </button>

    <!-- LOGIN -->

    <section
        id="loginBox"
        class="card">

        <h2>Login</h2>

        <input
            id="usuario"
            placeholder="Usuário">

        <input
            id="senha"
            type="password"
            placeholder="Senha">

        <button
            class="btnAzul"
            onclick="login()">

            Entrar

        </button>

    </section>

    <!-- PAINEL -->

    <section
        id="painel"
        class="hidden">

        <div class="dashboard">

            <div class="dashCard">

                <h3 id="totalClinicas">0</h3>

                <span>Clínicas</span>

            </div>

            <div class="dashCard">

                <h3 id="totalEspecialidades">0</h3>

                <span>Especialidades</span>

            </div>

            <div class="dashCard">

                <h3 id="totalRegioes">0</h3>

                <span>Regiões</span>

            </div>

            <div class="dashCard">

                <h3 id="totalEstados">0</h3>

                <span>Estados</span>

            </div>

            <div class="dashCard">

                <h3 id="totalCidades">0</h3>

                <span>Cidades</span>

            </div>

            <div class="dashCard">

                <h3 id="totalBairros">0</h3>

                <span>Bairros</span>

            </div>

        </div>
