<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo | Rede Especialistas</title>

<link rel="icon" href="img/tooth.png">

<link rel="stylesheet" href="css/admin.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">

    <div class="login-box">

        <img src="img/tooth.png" class="logo">

        <h1>Rede Especialistas</h1>

        <p>Painel Administrativo</p>

        <input
            type="text"
            id="usuario"
            placeholder="Usuário">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button id="btnLogin">
            Entrar
        </button>

        <div id="loginMensagem"></div>

    </div>

</div>

<!-- PAINEL -->
<div id="painel" class="painel hidden">

    <!-- MENU -->
    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="img/tooth.png">

            <h2>Rede Especialistas</h2>

        </div>

        <nav>

            <button class="menu-btn active" data-page="dashboard">
                📊 Dashboard
            </button>

            <button class="menu-btn" data-page="clinicas">
                🏥 Clínicas
            </button>

            <button class="menu-btn" data-page="especialidades">
                🦷 Especialidades
            </button>

            <button class="menu-btn" data-page="regioes">
                🌎 Regiões
            </button>

            <button class="menu-btn" data-page="estados">
                📍 Estados
            </button>

            <button class="menu-btn" data-page="cidades">
                🏙 Cidades
            </button>

            <button class="menu-btn" data-page="bairros">
                📌 Bairros
            </button>

        </nav>

        <button id="btnLogout" class="logout">

            Sair

        </button>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <!-- TOPO -->
        <header class="topbar">

            <h1 id="tituloPagina">

                Dashboard

            </h1>

        </header>

        <!-- DASHBOARD -->
        <section id="dashboard" class="page">

            <div class="cards">

                <div class="card">

                    <h3>Clínicas</h3>

                    <span id="totalClinicas">0</span>

                </div>

                <div class="card">

                    <h3>Especialidades</h3>

                    <span id="totalEspecialidades">0</span>

                </div>

                <div class="card">

                    <h3>Estados</h3>

                    <span id="totalEstados">0</span>

                </div>

                <div class="card">

                    <h3>Cidades</h3>

                    <span id="totalCidades">0</span>

                </div>

            </div>

        </section>

        <!-- ÁREA DINÂMICA -->
        <section id="conteudo"></section>

    </main>

</div>

<script src="js/supabase.js"></script>
<script src="js/login.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
