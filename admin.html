<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>

    <link rel="icon" href="img/tooth.png">

    <!-- CSS -->
    <link rel="stylesheet" href="css/admin.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <!-- ===========================
         LOGIN
    ============================ -->

    <div id="loginArea" class="login-container">

        <div class="login-box">

            <img src="img/tooth.png" class="login-logo">

            <h1>Painel Administrativo</h1>

            <p>
                Gerenciamento das Redes Credenciadas
            </p>

            <div class="campo">

                <label>Usuário</label>

                <input
                    type="text"
                    id="usuario"
                    placeholder="Digite o usuário">

            </div>

            <div class="campo">

                <label>Senha</label>

                <input
                    type="password"
                    id="senha"
                    placeholder="Digite a senha">

            </div>

            <button id="btnEntrar">

                Entrar

            </button>

            <div id="erroLogin"></div>

        </div>

    </div>

    <!-- ===========================
         PAINEL
    ============================ -->

    <div id="painelAdmin" class="painel" style="display:none;">

        <!-- HEADER -->

        <header class="header-admin">

            <div>

                <h1>
                    ⚙ Painel Administrativo
                </h1>

                <p>
                    Sistema de gerenciamento das Redes Credenciadas
                </p>

            </div>

            <div>

                <button id="btnSair">

                    🚪 Sair

                </button>

            </div>

        </header>

        <!-- LAYOUT -->

        <div class="layout-admin">

            <!-- MENU -->

            <aside class="menu-admin">

                <button id="btnClinicas">

                    🏥 Clínicas

                </button>

                <button id="btnEspecialidades">

                    🦷 Especialidades

                </button>

                <button id="btnRegioes">

                    🌎 Regiões

                </button>

                <button id="btnEstados">

                    📍 Estados

                </button>

                <button id="btnCidades">

                    🏙 Cidades

                </button>

                <button id="btnBairros">

                    📌 Bairros

                </button>

            </aside>

            <!-- ÁREA DE TRABALHO -->

            <main id="areaConteudo" class="conteudo-admin">

                <div class="card">

                    <h2>

                        Bem-vindo

                    </h2>

                    <p>

                        Selecione um módulo no menu ao lado.

                    </p>

                </div>

            </main>

        </div>

    </div>

    <!-- ===========================
         SCRIPTS
    ============================ -->

    <script src="js/supabase.js"></script>

    <script src="js/login.js"></script>

    <script src="js/admin.js"></script>

    <script src="js/clinicas.js"></script>

    <script src="js/especialidades.js"></script>

    <script src="js/regioes.js"></script>

    <script src="js/estados.js"></script>

    <script src="js/cidades.js"></script>

    <script src="js/bairros.js"></script>

</body>

</html>
