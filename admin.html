<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>


<link rel="icon" href="img/tooth.png">


<link rel="stylesheet" href="css/admin.css">


<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</head>


<body>

<!-- =================================================
     LOGIN
================================================= -->


<section id="loginArea" class="login-container">


    <div class="login-box">


        <img src="img/tooth.png" alt="Logo">


        <h1>
            Painel Administrativo
        </h1>


        <p>
            Redes Credenciadas
        </p>



        <div class="campo">


            <input
            type="text"
            id="usuario"
            placeholder="Usuário">


        </div>

        <div class="campo">


            <input
            type="password"
            id="senha"
            placeholder="Senha">
        </div>
        <button onclick="login()">

            Entrar

        </button>



        <div id="erroLogin"></div>

    </div>


</section>

<!-- =================================================
     PAINEL
================================================= -->


<section id="painelAdmin" style="display:none;">

<header class="admin-header">


    <div class="titulo-admin">


        <h1>
            ⚙ Painel Administrativo
        </h1>


        <p>
            Gerenciamento das redes credenciadas
        </p>


    </div>

    <button onclick="sairAdmin()">

        🚪 Sair

    </button>



</header>

<div class="admin-layout">

<!-- ==========================
     MENU
=========================== -->


<aside class="menu-admin">



    <div class="logo-admin">


        <img src="img/tooth.png">


        <h2>
            Redes
        </h2>


    </div>

    <nav>



        <button onclick="abrirModulo('clinicas')">

            🏥 Clínicas

        </button>

        <button onclick="abrirModulo('especialidades')">

            🦷 Especialidades

        </button>

        <button onclick="abrirModulo('regioes')">

            🌎 Regiões

        </button>

        <button onclick="abrirModulo('estados')">

            📍 Estados

        </button>

        <button onclick="abrirModulo('cidades')">

            🏙 Cidades

        </button>

        <button onclick="abrirModulo('bairros')">

            📌 Bairros

        </button>

    </nav>


</aside>

<!-- ==========================
     CONTEÚDO
=========================== -->


<main 
id="areaTrabalho"
class="area-trabalho">



<div class="bem-vindo">


    <h2>
        Bem-vindo ao painel
    </h2>



    <p>
        Escolha uma opção no menu lateral.
    </p>


</div>

</main>

</div>


</section>



<!-- =================================================
     SCRIPTS
================================================= -->


<script src="js/supabase.js"></script>

<script src="js/tema.js"></script>

<script src="js/admin.js"></script>



</body>

</html>
