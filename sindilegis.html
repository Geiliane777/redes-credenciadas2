<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">

    <title>Rede Sindilegis</title>

    <!-- Ícone -->
    <link rel="icon" href="img/tooth.png">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<!-- CLASSE SINDILEGIS -->
<body class="sindilegis">

<header class="header">

    <img src="img/tooth.png" class="logo">

    <h1>Rede Sindilegis</h1>

    <p>
        Encontre clínicas credenciadas da Rede Sindilegis
    </p>

    <div class="topoBotoes">

        <button onclick="location.href='index.html'">
            🦷 Rede Especialistas
        </button>

        <button class="ativo">
            🌐 Rede Sindilegis
        </button>

        <button id="btnTema">
            🌙 Tema Escuro
        </button>

        <button onclick="location.href='admin.html'">
            ⚙ Painel Administrativo
        </button>

    </div>

</header>

<main class="container">

    <section class="filtros">

        <select id="regiao"></select>

        <select id="estado"></select>

        <select id="cidade"></select>

        <select id="bairro"></select>

        <select id="especialidade">
            <option value="">Todas as Especialidades</option>
        </select>

        <button id="buscar">
            🔍 Buscar Clínicas
        </button>

    </section>

    <section id="resultado"></section>

</main>

<!-- JavaScript -->
<script src="js/supabase.js"></script>
<script src="js/tema.js"></script>
<script src="js/filtros.js"></script>
<script src="js/cards.js"></script>
<script src="js/sindilegis.js"></script>

</body>
</html>
